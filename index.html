<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VigiMap</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#161b22"/>
<link rel="icon" href="assets/icon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.Default.css"/>
<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet.markercluster.js"></script>
<script src="vendor/hls.min.js"></script>
<script src="vendor/dexie.min.js"></script>
<link rel="stylesheet" href="src/ui/theme.css"/>
<link rel="stylesheet" href="src/ui/layout.css"/>
<link rel="stylesheet" href="src/ui/components.css"/>
<link rel="stylesheet" href="src/ui/library.css"/>
<link rel="stylesheet" href="src/ui/sources.css"/>
</head><body>
<div id="loading-bar" class="loading-bar" style="display:none"></div>

<nav class="navbar">
  <div class="navbar__row navbar__row--top">
    <div class="navbar__brand">
      <img src="assets/icon.svg" width="22" height="22" alt=""/>
      <span>VigiMap</span><span class="badge--version">v2.0</span>
    </div>
    <div class="navbar__top-actions">
      <button class="connectivity-toggle is-online" id="btn-connectivity" type="button" title="En ligne" aria-label="Basculer en mode en ligne ou hors ligne" aria-pressed="false">
        <span class="connectivity-toggle__track">
          <span class="connectivity-toggle__thumb">🌐</span>
        </span>
      </button>
      <button class="btn btn--ghost btn--sm" id="btn-settings">⚙️</button>
    </div>
  </div>

  <div class="navbar__row navbar__row--toolbar">
    <div class="toolbar-row toolbar-row--nav" id="desktop-toolbar-nav">
      <button class="toolbar-nav-btn toolbar-nav-btn--active" data-panel-tab="streams">▶️ Flux</button>
      <button class="toolbar-nav-btn" data-panel-tab="library">📺 Bibliothèque</button>
      <button class="toolbar-nav-btn" data-panel-tab="queries">🔍 Requêtes CV</button>
      <button class="toolbar-nav-btn" data-panel-tab="logs">📋 Logs</button>
      <button class="toolbar-nav-btn" data-panel-tab="import">📂 Import</button>
    </div>

    <div class="toolbar-separator" aria-hidden="true"></div>

    <div class="toolbar-row toolbar-row--filters">
      <select class="select-sm" id="filter-source"><option value="">Toutes sources</option></select>
      <select class="select-sm" id="filter-status">
        <option value="">Tous statuts</option>
        <option value="live">🟢 Live</option>
        <option value="delayed">🟡 Différé</option>
        <option value="offline">🔴 Hors ligne</option>
      </select>
      <select class="select-sm" id="filter-country"><option value="">Tous pays</option></select>
      <button class="btn btn--ghost btn--sm" id="btn-refresh">↻</button>
    </div>
  </div>
</nav>

<div class="app-layout" id="app-layout">
  <div class="map-panel" id="map-panel">
    <div id="map"></div>
    <div class="map-legend" id="map-legend">
      <span class="legend-item"><span class="legend-dot legend-dot--live"></span>Live</span>
      <span class="legend-item"><span class="legend-dot legend-dot--delayed"></span>Différé / image fixe</span>
      <span class="legend-item"><span class="legend-dot legend-dot--offline"></span>Hors ligne</span>
      <span class="legend-item"><span class="legend-dot legend-dot--pinned"></span>Épinglée</span>
      <span class="legend-item"><span class="legend-dot legend-dot--unknown"></span>Inconnu</span>
    </div>
  </div>

  <div class="side-panel" id="side-panel">
    <div class="side-panel__resize-handle" id="side-panel-resize-handle" title="Redimensionner le panneau"></div>
    <div class="side-panel__toggle-wrap">
      <button class="side-panel__toggle" id="btn-side-panel-toggle" title="Masquer ou afficher la carte" aria-label="Masquer ou afficher la carte">‹</button>
    </div>

    <div class="panel-section hidden" id="source-panel">
      <div class="panel-header">
        <span>📡 Sources <small id="source-count" style="color:var(--text-3)"></small></span>
        <button class="btn btn--ghost btn--sm" id="btn-sources-close">✕</button>
      </div>
      <div id="source-list"></div>
    </div>

    <div class="panel-section panel-section--flex" id="streams-panel">
      <div class="panel-header"><span>▶️ Flux épinglés</span></div>
      <div class="player-grid" id="player-grid">
        <p class="player-empty">Épinglez une caméra depuis la carte ou ajoutez un flux via la bibliothèque.</p>
      </div>
    </div>

    <div class="panel-section hidden" id="library-panel">
      <div class="panel-header">
        <span>📺 Bibliothèque</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn--primary btn--sm" id="btn-add-stream-lib">➕</button>
          <button class="btn btn--ghost btn--sm" id="btn-lib-export" title="Exporter JSON">⬇ Export</button>
          <label class="btn btn--ghost btn--sm" style="cursor:pointer" title="Importer JSON">
            ⬆ Import<input type="file" id="lib-import-file" accept=".json" style="display:none"/>
          </label>
          <button class="btn btn--ghost btn--sm" id="btn-library-close">✕</button>
        </div>
      </div>
      <div class="lib-search">
        <input class="input" id="lib-search-input" placeholder="🔍 Rechercher nom, ville, tag…"/>
      </div>
      <div id="lib-list"></div>
    </div>

    <div class="panel-section hidden" id="import-panel">
      <div class="panel-header"><span>📂 Importer un média</span>
        <button class="btn btn--ghost btn--sm" id="btn-import-close">✕</button></div>
      <div style="padding:12px;display:flex;flex-direction:column;gap:10px">
        <label style="font-size:12px;color:var(--text-2)">Vidéo (MP4, MKV, WebM…)</label>
        <input type="file" id="import-video" accept="video/*" multiple class="input" style="font-size:11px"/>
        <label style="font-size:12px;color:var(--text-2)">Photo(s)</label>
        <input type="file" id="import-photo" accept="image/*" multiple class="input" style="font-size:11px"/>
        <button class="btn btn--primary btn--sm" id="btn-import-run">▶ Analyser</button>
      </div>
    </div>

    <div class="panel-section hidden" id="query-panel">
      <div class="panel-header"><span>🔍 Requêtes CV</span>
        <button class="btn btn--primary btn--sm" id="btn-add-query">+ Nouvelle</button></div>
      <div class="query-list" id="query-list"></div>
    </div>

    <div class="panel-section hidden" id="log-panel-side">
      <div class="panel-header"><span>📋 Logs</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn--ghost btn--sm" id="btn-export-logs">⬇</button>
          <button class="btn btn--ghost btn--sm" id="btn-export-report">📄</button>
          <button class="btn btn--ghost btn--sm" id="btn-clear-logs" style="color:var(--danger)">🗑</button>
        </div></div>
      <div class="log-list" id="log-list"></div>
      <div style="padding:4px 12px;font-size:10px;color:var(--text-3)" id="log-size-info"></div>
    </div>
  </div>
</div>

<div class="camera-popup hidden" id="camera-popup"><div id="camera-popup-inner"></div></div>

<div class="settings-panel hidden" id="settings-body">
  <div class="panel-header" style="padding:12px 16px">
    <span style="font-weight:600">⚙️ Paramètres</span>
    <button class="btn btn--ghost btn--sm" id="btn-settings-close">✕</button>
  </div>
  <div class="settings-panel__inner" id="settings-inner"></div>
</div>

<div class="modal-overlay hidden" id="query-modal"></div>

<nav class="mobile-nav" id="mobile-nav">
  <button class="mobile-nav__btn active" data-tab="map">🗺<span>Carte</span></button>
  <button class="mobile-nav__btn" data-tab="streams">▶️<span>Flux</span></button>
  <button class="mobile-nav__btn" data-tab="library">📺<span>Biblio</span></button>
  <button class="mobile-nav__btn" data-tab="queries">🔍<span>CV</span></button>
  <button class="mobile-nav__btn" data-tab="logs">📋<span>Logs</span></button>
  <button class="mobile-nav__btn" data-tab="import">📂<span>Import</span></button>
</nav>

<script type="module" src="src/app.js"></script>
</body></html>
