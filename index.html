<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VigiMap</title><link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#161b22"/>
<link rel="icon" href="assets/icon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.Default.css"/>
<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet.markercluster.js"></script>
<script src="vendor/hls.min.js"></script>
<script src="vendor/dexie.min.js"></script>
<link rel="stylesheet" href="src/ui/theme.css"/>
<link rel="stylesheet" href="src/ui/layout.css"/>
<link rel="stylesheet" href="src/ui/components.css"/>
</head><body>
<div id="loading-bar" class="loading-bar" style="display:none"></div>
<nav class="navbar">
  <div class="navbar__brand">
    <img src="assets/icon.svg" width="22" height="22" alt=""/>
    <span>VigiMap</span><span class="badge--version">v2.0</span>
  </div>
  <div class="navbar__actions">
    <button class="btn btn--ghost btn--sm" id="btn-sources">📡 Sources</button>
    <button class="btn btn--ghost btn--sm" id="btn-queries">🔍 Requêtes</button>
    <button class="btn btn--ghost btn--sm" id="btn-logs">📋 Logs</button>
    <button class="btn btn--ghost btn--sm" id="btn-import">📂 Importer</button>
    <button class="btn btn--ghost btn--sm" id="btn-cv-toggle" data-on="0">CV On</button>
    <button class="btn btn--ghost btn--sm" id="btn-settings">⚙️</button>
  </div>
</nav>

<div class="app-layout">
  <!-- ── GAUCHE : Carte ───────────────────────────────────────────────── -->
  <div class="map-panel" id="map-panel">
    <div class="map-toolbar">
      <select class="select-sm" id="filter-source"><option value="">Toutes sources</option></select>
      <select class="select-sm" id="filter-status">
        <option value="">Tous statuts</option>
        <option value="live">🟢 Live</option>
        <option value="delayed">🟡 Différé</option>
        <option value="offline">🔴 Hors ligne</option>
      </select>
      <select class="select-sm" id="filter-country"><option value="">Tous pays</option></select>
      <button class="btn btn--ghost btn--sm" id="btn-refresh">↻ Actualiser</button>
      <div class="map-legend">
        <span class="legend-dot" style="background:#3fb950"></span>Live
        <span class="legend-dot" style="background:#d29922"></span>Différé
        <span class="legend-dot" style="background:#f85149"></span>Hors ligne
        <span class="legend-dot" style="background:#a371f7"></span>Épinglée
        <span class="legend-dot" style="background:#f0883e"></span>Match CV
      </div>
    </div>
    <div id="map"></div>
  </div>

  <!-- ── DROITE : Sidebar ─────────────────────────────────────────────── -->
  <div class="side-panel" id="side-panel">

    <!-- Sources (dans sidebar droite) -->
    <div class="panel-section hidden" id="source-panel">
      <div class="panel-header">
        <span>📡 Sources</span>
        <button class="btn btn--ghost btn--sm" id="btn-sources-close">✕</button>
      </div>
      <div class="source-list" id="source-list"></div>
    </div>

    <!-- Streams épinglés (toujours visible) -->
    <div class="panel-section panel-section--flex" id="streams-panel">
      <div class="panel-header"><span>▶️ Flux épinglés</span></div>
      <div class="player-grid" id="player-grid">
        <p class="player-empty">Épinglez une caméra depuis la carte</p>
      </div>
    </div>

    <!-- Import média -->
    <div class="panel-section hidden" id="import-panel">
      <div class="panel-header">
        <span>📂 Importer un média</span>
        <button class="btn btn--ghost btn--sm" id="btn-import-close">✕</button>
      </div>
      <div style="padding:12px;display:flex;flex-direction:column;gap:10px">
        <label style="font-size:12px;color:var(--text-2)">Vidéo (MP4, MKV, WebM…)</label>
        <input type="file" id="import-video" accept="video/*" multiple class="input" style="font-size:11px"/>
        <label style="font-size:12px;color:var(--text-2)">Photo(s) (JPG, PNG, WEBP…)</label>
        <input type="file" id="import-photo" accept="image/*" multiple class="input" style="font-size:11px"/>
        <button class="btn btn--primary btn--sm" id="btn-import-run">▶ Analyser avec les requêtes actives</button>
      </div>
    </div>

    <!-- Requêtes CV -->
    <div class="panel-section hidden" id="query-panel">
      <div class="panel-header">
        <span>🔍 Requêtes CV</span>
        <button class="btn btn--primary btn--sm" id="btn-add-query">+ Nouvelle</button>
      </div>
      <div class="query-list" id="query-list"></div>
    </div>

    <!-- Logs -->
    <div class="panel-section hidden" id="log-panel-side">
      <div class="panel-header">
        <span>📋 Logs détections</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn--ghost btn--sm" id="btn-export-logs">⬇ Export</button>
          <button class="btn btn--ghost btn--sm" id="btn-clear-logs" style="color:var(--danger)">🗑</button>
        </div>
      </div>
      <div class="log-list" id="log-list"></div>
      <div style="padding:4px 12px;font-size:10px;color:var(--text-3)" id="log-size-info"></div>
    </div>

  </div>
</div>

<!-- Popup caméra -->
<div class="camera-popup hidden" id="camera-popup"><div id="camera-popup-inner"></div></div>

<!-- Settings panel (slide droite) -->
<div class="settings-panel hidden" id="settings-body">
  <div class="panel-header" style="padding:12px 16px">
    <span style="font-weight:600">⚙️ Paramètres</span>
    <button class="btn btn--ghost btn--sm" id="btn-settings-close">✕</button>
  </div>
  <div class="settings-panel__inner" id="settings-inner"></div>
</div>

<!-- Modal requêtes -->
<div class="modal-overlay hidden" id="query-modal"></div>

<!-- Mobile nav -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="mobile-nav__btn active" data-tab="map">🗺<br><span>Carte</span></button>
  <button class="mobile-nav__btn" data-tab="streams">▶️<br><span>Flux</span></button>
  <button class="mobile-nav__btn" data-tab="queries">🔍<br><span>Requêtes</span></button>
  <button class="mobile-nav__btn" data-tab="logs">📋<br><span>Logs</span></button>
</nav>

<script type="module" src="src/app.js"></script>
</body></html>
